services:
  api:
    image: ${API_IMAGE}
    restart: unless-stopped
    env_file:
      - ./env/api.env
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - postgres

  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    env_file:
      - ./env/postgres.env
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
